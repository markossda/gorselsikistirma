<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gorsel Sikistirici</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #111;
            color: #ddd;
            min-height: 100vh;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; color: #fff; }
        .subtitle { color: #666; margin-bottom: 40px; font-size: 14px; }

        .drop-zone {
            border: 1.5px dashed #333;
            border-radius: 8px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s;
            margin-bottom: 20px;
            background: #1a1a1a;
        }

        .drop-zone:hover, .drop-zone.dragover { border-color: #666; }
        .drop-zone p { color: #666; font-size: 14px; }
        .drop-zone .browse { color: #ccc; text-decoration: underline; cursor: pointer; }
        .drop-zone .hint { margin-top: 8px; font-size: 12px; color: #444; }

        .file-summary {
            display: none;
            background: #1a1a1a;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 16px 20px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .file-summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-summary-row span { color: #888; }
        .file-summary-row strong { color: #fff; }

        .file-mini-list {
            max-height: 180px;
            overflow-y: auto;
            margin-top: 12px;
            border-top: 1px solid #222;
            padding-top: 8px;
            display: none;
        }

        .fml-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 13px;
            color: #555;
        }

        .fml-item .fml-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .fml-item .fml-size { margin-left: 12px; white-space: nowrap; }

        .toggle-btn {
            background: none;
            border: none;
            color: #555;
            font-size: 13px;
            cursor: pointer;
            padding: 0;
            margin-top: 8px;
        }

        .toggle-btn:hover { color: #ccc; }

        /* FOLDER SELECT */
        .folder-section {
            display: none;
            margin-bottom: 20px;
        }

        .folder-section label {
            display: block;
            font-size: 13px;
            color: #888;
            margin-bottom: 6px;
        }

        .folder-row {
            display: flex;
            gap: 10px;
        }

        .folder-row select {
            flex: 1;
            padding: 10px 12px;
            background: #1a1a1a;
            border: 1px solid #222;
            border-radius: 6px;
            color: #ccc;
            font-size: 14px;
            outline: none;
            appearance: none;
            cursor: pointer;
        }

        .folder-row select:focus { border-color: #444; }
        .folder-row select option { background: #1a1a1a; }

        .folder-path {
            font-size: 12px;
            color: #555;
            margin-top: 6px;
        }

        .btn-row { display: flex; gap: 10px; margin-bottom: 10px; }

        .btn {
            flex: 1;
            padding: 12px;
            font-size: 14px;
            font-weight: 500;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .btn-primary { background: #fff; color: #111; }
        .btn-primary:hover:not(:disabled) { background: #ddd; }

        .btn-download { background: #1a1a1a; color: #ccc; border: 1px solid #333; }
        .btn-download:hover:not(:disabled) { background: #222; }

        .btn-upload { background: #4caf50; color: #fff; }
        .btn-upload:hover:not(:disabled) { background: #43a047; }

        .btn-clear {
            background: none;
            border: 1px solid #222;
            color: #555;
            padding: 10px;
            font-size: 13px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
        }

        .btn-clear:hover { border-color: #444; color: #ccc; }

        .progress-section { margin-top: 20px; display: none; }

        .progress-bar-track {
            width: 100%;
            height: 3px;
            background: #222;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-bar-fill {
            height: 100%;
            background: #fff;
            border-radius: 2px;
            transition: width 0.3s;
            width: 0%;
        }

        .progress-text { font-size: 13px; color: #555; text-align: center; }

        .results { margin-top: 30px; display: none; }
        .results h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #fff; }

        .stats { display: flex; gap: 12px; margin-bottom: 16px; }

        .stat-card {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 14px;
            text-align: center;
        }

        .stat-card .value { font-size: 20px; font-weight: 600; }
        .stat-card .label { font-size: 11px; color: #555; margin-top: 2px; }
        .stat-card.success .value { color: #4caf50; }
        .stat-card.error .value { color: #ef5350; }
        .stat-card.saved .value { color: #fff; }

        .result-list { max-height: 350px; overflow-y: auto; }

        .result-item {
            display: flex;
            align-items: center;
            padding: 8px 0;
            font-size: 13px;
            border-bottom: 1px solid #1a1a1a;
        }

        .result-item:last-child { border-bottom: none; }

        .result-item .dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .result-item .dot.ok { background: #4caf50; }
        .result-item .dot.error { background: #ef5350; }
        .result-item .info { flex: 1; }
        .result-item .info .name { color: #ccc; }
        .result-item .info .detail { color: #555; font-size: 12px; margin-top: 1px; }

        .result-item .badge {
            color: #4caf50;
            font-size: 12px;
            font-weight: 500;
        }

        input[type="file"] { display: none; }

        @media (max-width: 600px) {
            .btn-row { flex-direction: column; }
            .stats { flex-direction: column; }
            .folder-row { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gorsel Sikistirici</h1>
        <p class="subtitle">Toplu sikistir, klasor sec, Supabase'e yukle</p>

        <div class="drop-zone" id="dropZone">
            <p>Gorselleri surukle birak veya <span class="browse">dosya sec</span></p>
            <p class="hint">PNG, JPG, WEBP, HEIC, BMP, TIFF</p>
        </div>
        <input type="file" id="fileInput" multiple accept="image/*">

        <div class="file-summary" id="fileSummary">
            <div class="file-summary-row">
                <span id="summaryText">0 gorsel</span>
                <strong id="summarySize">0 MB</strong>
            </div>
            <div class="file-mini-list" id="fileMiniList"></div>
            <button class="toggle-btn" id="toggleListBtn">Listeyi goster</button>
        </div>

        <div class="folder-section" id="folderSection">
            <label>Yuklenecek klasor</label>
            <div class="folder-row">
                <select id="folderMain">
                    <option value="">Ana klasor sec...</option>
                </select>
                <select id="folderSub" disabled>
                    <option value="">Alt klasor sec...</option>
                </select>
            </div>
            <div class="folder-path" id="folderPath"></div>
        </div>

        <div class="btn-row">
            <button class="btn btn-primary" id="compressBtn" disabled>Sikistir</button>
            <button class="btn btn-download" id="downloadBtn" disabled>ZIP Indir</button>
        </div>
        <div class="btn-row" id="uploadRow" style="display:none">
            <button class="btn btn-upload" id="uploadBtn" disabled>Supabase'e Yukle</button>
        </div>
        <button class="btn-clear" id="clearBtn" style="display:none">Temizle</button>

        <div class="progress-section" id="progressSection">
            <div class="progress-bar-track">
                <div class="progress-bar-fill" id="progressFill"></div>
            </div>
            <p class="progress-text" id="progressText"></p>
        </div>

        <div class="results" id="resultsSection">
            <h2 id="resultsTitle">Sonuclar</h2>
            <div class="stats" id="statsContainer"></div>
            <div class="result-list" id="resultsList"></div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileSummary = document.getElementById('fileSummary');
        const fileMiniList = document.getElementById('fileMiniList');
        const toggleListBtn = document.getElementById('toggleListBtn');
        const compressBtn = document.getElementById('compressBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const uploadBtn = document.getElementById('uploadBtn');
        const uploadRow = document.getElementById('uploadRow');
        const clearBtn = document.getElementById('clearBtn');
        const folderSection = document.getElementById('folderSection');
        const folderMain = document.getElementById('folderMain');
        const folderSub = document.getElementById('folderSub');
        const folderPath = document.getElementById('folderPath');
        const progressSection = document.getElementById('progressSection');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const resultsSection = document.getElementById('resultsSection');
        const resultsTitle = document.getElementById('resultsTitle');
        const statsContainer = document.getElementById('statsContainer');
        const resultsList = document.getElementById('resultsList');

        let selectedFiles = [];
        let listVisible = false;
        let compressed = false;

        // Drop & file select
        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.stopPropagation();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            e.stopPropagation();
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', async (e) => {
            e.preventDefault();
            e.stopPropagation();
            dropZone.classList.remove('dragover');

            const items = e.dataTransfer.items;
            if (items && items.length > 0 && items[0].webkitGetAsEntry) {
                const entries = [];
                for (let i = 0; i < items.length; i++) {
                    const entry = items[i].webkitGetAsEntry();
                    if (entry) entries.push(entry);
                }
                const files = await getAllFiles(entries);
                addFiles(files);
            } else {
                addFiles(e.dataTransfer.files);
            }
        });

        async function getAllFiles(entries) {
            const files = [];
            const queue = [...entries];
            while (queue.length > 0) {
                const entry = queue.shift();
                if (entry.isFile) {
                    const file = await new Promise(resolve => entry.file(resolve));
                    if (file.type.startsWith('image/')) files.push(file);
                } else if (entry.isDirectory) {
                    const reader = entry.createReader();
                    const subEntries = await new Promise(resolve => {
                        const all = [];
                        const readBatch = () => {
                            reader.readEntries(results => {
                                if (results.length === 0) resolve(all);
                                else { all.push(...results); readBatch(); }
                            });
                        };
                        readBatch();
                    });
                    queue.push(...subEntries);
                }
            }
            return files;
        }

        fileInput.addEventListener('change', () => {
            addFiles(fileInput.files);
            fileInput.value = '';
        });

        function addFiles(files) {
            for (const f of files) {
                if (f.type && f.type.startsWith('image/')) selectedFiles.push(f);
            }
            if (selectedFiles.length > 0) updateSummary();
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function updateSummary() {
            const total = selectedFiles.length;
            const totalSize = selectedFiles.reduce((s, f) => s + f.size, 0);

            fileSummary.style.display = 'block';
            document.getElementById('summaryText').textContent = total + ' gorsel';
            document.getElementById('summarySize').textContent = formatSize(totalSize);

            compressBtn.disabled = total === 0;
            clearBtn.style.display = total > 0 ? 'block' : 'none';

            if (listVisible) renderMiniList();
        }

        function renderMiniList() {
            const frag = document.createDocumentFragment();
            selectedFiles.forEach(f => {
                const div = document.createElement('div');
                div.className = 'fml-item';
                div.innerHTML = '<span class="fml-name">' + f.name + '</span><span class="fml-size">' + formatSize(f.size) + '</span>';
                frag.appendChild(div);
            });
            fileMiniList.innerHTML = '';
            fileMiniList.appendChild(frag);
        }

        toggleListBtn.addEventListener('click', () => {
            listVisible = !listVisible;
            fileMiniList.style.display = listVisible ? 'block' : 'none';
            toggleListBtn.textContent = listVisible ? 'Listeyi gizle' : 'Listeyi goster';
            if (listVisible) renderMiniList();
        });

        clearBtn.addEventListener('click', () => {
            selectedFiles = [];
            compressed = false;
            fileSummary.style.display = 'none';
            resultsSection.style.display = 'none';
            progressSection.style.display = 'none';
            folderSection.style.display = 'none';
            uploadRow.style.display = 'none';
            clearBtn.style.display = 'none';
            compressBtn.disabled = true;
            downloadBtn.disabled = true;
            uploadBtn.disabled = true;
            listVisible = false;
            fileMiniList.style.display = 'none';
            toggleListBtn.textContent = 'Listeyi goster';
        });

        // Folder loading
        async function loadFolders(prefix, targetSelect) {
            targetSelect.innerHTML = '<option value="">Yukleniyor...</option>';
            targetSelect.disabled = true;
            try {
                const res = await fetch('/folders?prefix=' + encodeURIComponent(prefix));
                const data = await res.json();
                if (data.error) throw new Error(data.error);

                targetSelect.innerHTML = '<option value="">Sec...</option>';
                data.folders.forEach(name => {
                    const opt = document.createElement('option');
                    opt.value = name;
                    opt.textContent = name;
                    targetSelect.appendChild(opt);
                });
                targetSelect.disabled = false;
            } catch (err) {
                targetSelect.innerHTML = '<option value="">Hata: ' + err.message + '</option>';
            }
        }

        folderMain.addEventListener('change', () => {
            folderSub.innerHTML = '<option value="">Alt klasor sec...</option>';
            folderSub.disabled = true;
            folderPath.textContent = '';
            uploadBtn.disabled = true;

            if (folderMain.value) {
                loadFolders(folderMain.value, folderSub);
            }
        });

        folderSub.addEventListener('change', () => {
            if (folderMain.value && folderSub.value) {
                const path = folderMain.value + '/' + folderSub.value;
                folderPath.textContent = 'Yol: ' + path;
                uploadBtn.disabled = false;
            } else {
                folderPath.textContent = '';
                uploadBtn.disabled = true;
            }
        });

        // Compress
        compressBtn.addEventListener('click', async () => {
            if (selectedFiles.length === 0) return;

            compressBtn.disabled = true;
            downloadBtn.disabled = true;
            progressSection.style.display = 'block';
            resultsSection.style.display = 'none';
            progressFill.style.width = '0%';
            progressText.textContent = '0 / ' + selectedFiles.length;

            const batchSize = 5;
            const allResults = [];

            for (let i = 0; i < selectedFiles.length; i += batchSize) {
                const batch = selectedFiles.slice(i, i + batchSize);
                const formData = new FormData();
                batch.forEach(f => formData.append('images', f));

                try {
                    const res = await fetch('/compress', { method: 'POST', body: formData });
                    const data = await res.json();
                    if (data.error) {
                        batch.forEach(f => allResults.push({ filename: f.name, status: 'error', message: data.error }));
                    } else {
                        allResults.push(...data.results);
                    }
                } catch (err) {
                    batch.forEach(f => allResults.push({ filename: f.name, status: 'error', message: 'Baglanti hatasi' }));
                }

                const processed = Math.min(selectedFiles.length, i + batch.length);
                progressFill.style.width = Math.round((processed / selectedFiles.length) * 100) + '%';
                progressText.textContent = processed + ' / ' + selectedFiles.length;
            }

            compressed = true;
            resultsTitle.textContent = 'Sikistirma Sonuclari';
            showResults(allResults);
            compressBtn.disabled = false;
            downloadBtn.disabled = allResults.filter(r => r.status === 'ok').length === 0;

            // Show folder section & upload button
            folderSection.style.display = 'block';
            uploadRow.style.display = 'flex';
            loadFolders('', folderMain);
        });

        // Download ZIP
        downloadBtn.addEventListener('click', async () => {
            downloadBtn.disabled = true;
            progressSection.style.display = 'block';
            progressFill.style.width = '0%';
            progressText.textContent = 'ZIP hazirlaniyor...';

            const formData = new FormData();
            selectedFiles.forEach(f => formData.append('images', f));

            try {
                const res = await fetch('/download', { method: 'POST', body: formData });
                if (!res.ok) throw new Error('Hata');
                progressFill.style.width = '100%';
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'compressed_images.zip';
                a.click();
                URL.revokeObjectURL(url);
            } catch (err) {
                alert('Indirme hatasi');
            }

            progressSection.style.display = 'none';
            downloadBtn.disabled = false;
        });

        // Upload to Supabase
        uploadBtn.addEventListener('click', async () => {
            const folder = folderMain.value + '/' + folderSub.value;
            if (!folderMain.value || !folderSub.value) {
                alert('Klasor sec');
                return;
            }

            uploadBtn.disabled = true;
            compressBtn.disabled = true;
            downloadBtn.disabled = true;
            progressSection.style.display = 'block';
            progressFill.style.width = '0%';
            progressText.textContent = 'Supabase\'e yukleniyor...';

            const batchSize = 3;
            const allResults = [];

            for (let i = 0; i < selectedFiles.length; i += batchSize) {
                const batch = selectedFiles.slice(i, i + batchSize);
                const formData = new FormData();
                batch.forEach(f => formData.append('images', f));
                formData.append('folder', folder);

                try {
                    const res = await fetch('/upload', { method: 'POST', body: formData });
                    const data = await res.json();
                    if (data.error) {
                        batch.forEach(f => allResults.push({ filename: f.name, status: 'error', message: data.error }));
                    } else {
                        allResults.push(...data.results);
                    }
                } catch (err) {
                    batch.forEach(f => allResults.push({ filename: f.name, status: 'error', message: 'Baglanti hatasi' }));
                }

                const processed = Math.min(selectedFiles.length, i + batch.length);
                progressFill.style.width = Math.round((processed / selectedFiles.length) * 100) + '%';
                progressText.textContent = processed + ' / ' + selectedFiles.length + ' yuklendi';
            }

            resultsTitle.textContent = 'Yukleme Sonuclari';
            showResults(allResults);
            uploadBtn.disabled = false;
            compressBtn.disabled = false;
            downloadBtn.disabled = false;
        });

        function showResults(results) {
            progressSection.style.display = 'none';
            resultsSection.style.display = 'block';

            const ok = results.filter(r => r.status === 'ok');
            const errCount = results.length - ok.length;
            const totalSaved = ok.reduce((s, r) => s + (r.original_kb - r.compressed_kb), 0);

            statsContainer.innerHTML =
                '<div class="stat-card success"><div class="value">' + ok.length + '</div><div class="label">Basarili</div></div>' +
                '<div class="stat-card error"><div class="value">' + errCount + '</div><div class="label">Hatali</div></div>' +
                '<div class="stat-card saved"><div class="value">' + (totalSaved > 1024 ? (totalSaved/1024).toFixed(1) + ' MB' : totalSaved + ' KB') + '</div><div class="label">Tasarruf</div></div>';

            const frag = document.createDocumentFragment();
            results.forEach(r => {
                const div = document.createElement('div');
                div.className = 'result-item';
                div.innerHTML =
                    '<div class="dot ' + r.status + '"></div>' +
                    '<div class="info"><div class="name">' + r.filename + '</div>' +
                    '<div class="detail">' + (r.status === 'ok' ? r.original_kb + ' KB → ' + r.compressed_kb + ' KB' + (r.path ? ' — ' + r.path : '') : r.message) + '</div></div>' +
                    (r.status === 'ok' ? '<span class="badge">' + r.reduction + '</span>' : '');
                frag.appendChild(div);
            });
            resultsList.innerHTML = '';
            resultsList.appendChild(frag);
        }
    </script>
</body>
</html>
